name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - WeeTeck02
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm run test:ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:ci

      - name: Run backend smoke test
        working-directory: backend
        run: |
          SKIP_DB=true PORT=5001 node server.js > /tmp/forum-backend.log 2>&1 &
          APP_PID=$!
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:5001/ >/dev/null 2>&1; then
              echo "Backend smoke test passed"
              kill $APP_PID
              wait $APP_PID || true
              exit 0
            fi
            sleep 1
          done
          echo "Backend smoke test failed"
          cat /tmp/forum-backend.log
          exit 1

  build-and-deploy:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/WeeTeck02'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t forum-backend:ci-${{ github.sha }} .

      - name: Run container smoke test
        run: |
          docker run -d --name forum-backend-ci -p 5000:5000 -e NODE_ENV=production -e PORT=5000 forum-backend:ci-${{ github.sha }}
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:5000/ >/dev/null 2>&1; then
              echo "Container health check passed"
              docker stop forum-backend-ci >/dev/null 2>&1 || true
              docker rm forum-backend-ci >/dev/null 2>&1 || true
              exit 0
            fi
            sleep 2
          done
          docker logs forum-backend-ci || true
          docker stop forum-backend-ci >/dev/null 2>&1 || true
          docker rm forum-backend-ci >/dev/null 2>&1 || true
          exit 1

      - name: Deploy to local compose stack
        run: |
          docker compose up -d --build
          docker compose ps
          docker compose logs backend --tail=50 || true
