<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyQuest Forum</title>
  </head>
  <body>
    <!-- Keep session for the running webapp; do not clear auth here -->
    <div id="root"></div>
    <script>
      // If we arrive with an authToken (after login), persist it and continue.
      // Otherwise, always send the user to the login page first.
      (function() {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('authToken') || params.get('token') || localStorage.getItem('threadquest_auth_token');

        if (token) {
          try {
            localStorage.setItem('threadquest_auth_token', token);
            // remove token from URL for cleanliness
            window.history.replaceState({}, '', window.location.pathname);
          } catch (err) {
            console.warn('Failed to persist auth token:', err);
          }
          return; // allow app to load
        }

        // No authToken in query — always show the login page first
        try {
          window.location.replace('/login.html');
        } catch (err) {
          console.warn('Redirect to login failed', err);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
