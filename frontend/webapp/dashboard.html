<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | StudyQuest</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: #f4f2eb;
      color: #1f2c28;
      padding: 24px;
    }
    .dashboard-shell {
      max-width: 1000px;
      margin: 0 auto;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .header-row h1 {
      margin: 0;
      font-size: 36px;
    }
    .nav-links {
      display: flex;
      gap: 16px;
    }
    .nav-link {
      color: #2f665a;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 28px;
    }
    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(31, 44, 40, 0.08);
    }
    .card-title {
      font-weight: 700;
      color: #3a4a3f;
      margin: 0 0 8px;
      font-size: 14px;
    }
    .card-value {
      font-size: 32px;
      font-weight: 700;
      color: #2f665a;
      margin: 0;
    }
    .card-meta {
      font-size: 13px;
      color: #556157;
      margin-top: 8px;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e4e6e2;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: #2f665a;
      border-radius: 999px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #556157;
    }
    .error {
      text-align: center;
      padding: 40px;
      color: #c74343;
      background: #fef1f1;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="dashboard-shell">
    <div class="header-row">
      <h1>📊 My Dashboard</h1>
      <div class="nav-links">
        <a href="./index.html" class="nav-link">Home</a>
        <a href="./profile.html" class="nav-link">Profile</a>
        <a href="./leaderboard.html" class="nav-link">Leaderboard</a>
      </div>
    </div>

    <div id="content" class="loading">Loading dashboard…</div>
  </div>

  <script>
    const API_URL = 'http://127.0.0.1:5000/api';
    const TOKEN_KEY = 'threadquest_auth_token';
    const USER_KEY = 'threadquest_auth_user';
    const contentEl = document.getElementById('content');

    async function loadDashboard() {
      try {
        const token = localStorage.getItem(TOKEN_KEY);
        const user = JSON.parse(localStorage.getItem(USER_KEY) || '{}');

        if (!token || !user.username) {
          contentEl.innerHTML = '<div class="error">Not signed in. Please log in first.</div>';
          return;
        }

        const response = await fetch(`${API_URL}/dashboard/${user.username}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) throw new Error(`Failed to load dashboard: ${response.status}`);
        const dashboard = await response.json();

        let html = `<div class="grid">
          <div class="card">
            <p class="card-title">Level</p>
            <p class="card-value">${dashboard.level || 1}</p>
            <p class="card-meta">${dashboard.title || 'Player'}</p>
          </div>
          
          <div class="card">
            <p class="card-title">XP Progress</p>
            <p class="card-value">${dashboard.xp || 0}</p>
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${dashboard.xpProgress ? Math.min(100, (dashboard.xpProgress.current / dashboard.xpProgress.needed) * 100) : 0}%"></div>
            </div>
            <p class="card-meta">${dashboard.xpProgress ? Math.round((dashboard.xpProgress.current / dashboard.xpProgress.needed) * 100) : 0}% to next level</p>
          </div>

          <div class="card">
            <p class="card-title">Coins</p>
            <p class="card-value">${dashboard.coins || 0}</p>
            <p class="card-meta">${dashboard.coinsToday || 0} earned today</p>
          </div>

          <div class="card">
            <p class="card-title">Achievements</p>
            <p class="card-value">${dashboard.achievements?.earned || 0}/${dashboard.achievements?.total || 0}</p>
            <p class="card-meta">Next: ${dashboard.achievements?.next || 'None'}</p>
          </div>

          <div class="card">
            <p class="card-title">Leaderboard Position</p>
            <p class="card-value">#${dashboard.leaderboard?.position || '—'}</p>
            <p class="card-meta">${dashboard.leaderboard?.change > 0 ? '📈 up' : dashboard.leaderboard?.change < 0 ? '📉 down' : '➡️'} ${Math.abs(dashboard.leaderboard?.change || 0)} spots</p>
          </div>

          <div class="card">
            <p class="card-title">Daily Streak</p>
            <p class="card-value">${dashboard.dailyStreak || 0}</p>
            <p class="card-meta">🔥 Keep it going!</p>
          </div>
        </div>`;

        contentEl.innerHTML = html;
      } catch (err) {
        console.error(err);
        contentEl.innerHTML = `<div class="error">Failed to load dashboard: ${err.message}</div>`;
      }
    }

    loadDashboard();
  </script>
</body>
</html>
