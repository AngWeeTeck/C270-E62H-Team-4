<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | StudyQuest</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, sans-serif;
        background: #f4f2eb;
        color: #1f2c28;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .profile-shell {
        width: min(100%, 760px);
        background: white;
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(31, 44, 40, 0.12);
        padding: 32px 32px 40px;
      }
      .profile-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 32px;
      }
      .profile-header h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 36px);
        line-height: 1.05;
      }
      .profile-meta {
        color: #556157;
        margin: 0;
        font-size: 15px;
      }
      .card {
        border: 1px solid #e4e6e2;
        border-radius: 18px;
        padding: 28px;
        background: #faf9f4;
      }
      .field {
        display: grid;
        gap: 10px;
        margin-bottom: 18px;
      }
      .field strong {
        display: block;
        color: #3a4a3f;
        font-weight: 700;
      }
      .value {
        color: #4f5b51;
        font-size: 16px;
      }
      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 26px;
      }
      .btn {
        border: none;
        border-radius: 999px;
        padding: 12px 22px;
        font-weight: 700;
        cursor: pointer;
      }
      .btn-primary {
        background: #2f665a;
        color: white;
      }
      .btn-secondary {
        background: #f1f1e9;
        color: #3d4a41;
      }
      .status {
        margin: 0 0 24px;
        color: #556157;
      }
      .nav-link {
        display: inline-block;
        color: #2f665a;
        text-decoration: none;
        margin-right: 16px;
        font-weight: 700;
      }
    </style>
    <script src="/authGuard.js"></script>
  </head>
  <body>
    <main class="profile-shell">
      <div class="profile-header">
        <div>
          <p class="profile-meta">Profile</p>
          <h1>Your account</h1>
        </div>
        <div class="button-row">
          <a href="./index.html" class="nav-link">Home</a>
          <a href="./profile.html" class="nav-link">Profile</a>
          <a href="./leaderboard.html" class="nav-link">Leaderboard</a>
        </div>
      </div>

      <p id="status" class="status">Loading account details…</p>
      <div class="card">
        <div class="field">
          <strong>Username</strong>
          <div id="username" class="value">—</div>
        </div>
        <div class="field">
          <strong>Email</strong>
          <div id="email" class="value">—</div>
        </div>
        <div class="field">
          <strong>Member since</strong>
          <div id="joined" class="value">—</div>
        </div>
        <div class="button-row">
          <button id="logout" class="btn btn-primary">Log out</button>
        </div>
      </div>
    </main>

    <script>
      const TOKEN_KEY = 'threadquest_auth_token';
      const USER_KEY = 'threadquest_auth_user';
      const API_URL = window.location.protocol === 'file:' || window.location.hostname === 'localhost'
        ? 'http://127.0.0.1:5000/api'
        : '/api';

      const statusEl = document.getElementById('status');
      const usernameEl = document.getElementById('username');
      const emailEl = document.getElementById('email');
      const joinedEl = document.getElementById('joined');
      const logoutBtn = document.getElementById('logout');

      function clearSession() {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(USER_KEY);
        window.location.href = '/login.html';
      }

      function getSavedUser() {
        try {
          return JSON.parse(localStorage.getItem(USER_KEY));
        } catch {
          return null;
        }
      }

      async function loadProfile() {
        const token = localStorage.getItem(TOKEN_KEY);
        const savedUser = getSavedUser();

        if (!token || !savedUser) {
          statusEl.textContent = 'Not signed in. Return to login.';
          return;
        }

        usernameEl.textContent = savedUser.username || 'Unknown';
        emailEl.textContent = savedUser.email || 'Unknown';
        joinedEl.textContent = savedUser.createdAt ? new Date(savedUser.createdAt).toLocaleDateString() : 'Unknown';

        try {
          const response = await fetch(`${API_URL}/auth/me`, {
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`
            }
          });
          if (!response.ok) throw new Error('Session invalid');
          const data = await response.json();
          const user = data.user;
          usernameEl.textContent = user.username || usernameEl.textContent;
          emailEl.textContent = user.email || emailEl.textContent;
          joinedEl.textContent = user.createdAt ? new Date(user.createdAt).toLocaleDateString() : joinedEl.textContent;
          statusEl.textContent = 'Signed in successfully.';
        } catch (err) {
          statusEl.textContent = 'Session expired, please log in again.';
          clearSession();
        }
      }

      logoutBtn?.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        clearSession();
      });
      loadProfile();
    </script>
  </body>
</html>
