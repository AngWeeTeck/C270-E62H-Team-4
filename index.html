<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thread Quest</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { font-size: 2.25rem; }
    p { color: #8b949e; }
    .links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      text-decoration: none;
      color: #e6edf3;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
    }
    .card:hover { transform: translateY(-4px); border-color: #58a6ff; }
    .card .icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }
    .card small { display: block; color: #8b949e; font-size: 0.75rem; margin-top: 0.25rem; }
    .note {
      font-size: 0.8rem;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }
    code { color: #58a6ff; }
  </style>
</head>
<body>
  <div style="text-align:center">
    <h1>🧵 Thread Quest</h1>
    <p>Gamified discussion platform — Leaderboard &amp; Dashboard</p>
  </div>

  <div class="links">
    <a class="card" href="dashboard.html">
      <span class="icon">📊</span>
      Dashboard
      <small>Your level, coins &amp; rank</small>
    </a>
    <a class="card" href="frontend/leaderboard.html">
      <span class="icon">🏆</span>
      Leaderboard
      <small>Top questers by XP</small>
    </a>
  </div>

  <div class="note">
    Backend must be running: <code>cd backend && npm install && node server.js</code>
  </div>
</body>
</html>
