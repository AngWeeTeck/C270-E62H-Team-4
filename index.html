<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyQuest Community</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 0;
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        color: #111827;
      }
      .page {
        max-width: 900px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      .card {
        background: white;
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin-top: 0;
        color: #312e81;
      }
      .pill {
        display: inline-block;
        margin-top: 10px;
        padding: 8px 14px;
        background: #4f46e5;
        color: white;
        border-radius: 999px;
        font-weight: 700;
      }
      ul {
        padding-left: 20px;
      }
      li {
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <p class="pill">StudyQuest Community</p>
        <h1>Welcome to the community website</h1>
        <p>This page is now being served locally so you can view it in the browser.</p>
        <ul>
          <li>Forum discussions</li>
          <li>Notifications</li>
          <li>Social follow features</li>
        </ul>
      </div>
    </div>
  </body>
</html>
