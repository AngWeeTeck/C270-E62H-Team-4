- hosts: all
  gather_facts: false
  vars:
    staging_fastapi_port: 8001
    staging_streamlit_port: 8501
    production_fastapi_port: 8002
    production_streamlit_port: 8502
    fastapi_internal_port: 8000
    streamlit_internal_port: 8501

  tasks:
    - name: Print expected ports for environment
      ansible.builtin.debug:
        msg: |
          Environment: {{ inventory_hostname }}
          FastAPI host port: {{ staging_fastapi_port if inventory_hostname == 'localhost' else production_fastapi_port }}
          Streamlit host port: {{ staging_streamlit_port if inventory_hostname == 'localhost' else production_streamlit_port }}
